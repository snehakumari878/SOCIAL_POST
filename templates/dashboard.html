<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <!-- PROFILE CARD -->
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5 text-center">

                        <!-- Avatar -->
                        <div class="mb-4">
                            <div class="bg-primary text-white rounded-circle d-inline-flex 
                                align-items-center justify-content-center"
                                style="width:80px;height:80px;font-size:30px;">
                                {{ current_user[0].upper() }}
                            </div>
                        </div>

                        <h3 class="fw-bold mb-3">
                            Welcome, {{ current_user }}
                        </h3>

                        <p class="text-muted mb-4">
                            Manage your account settings below.
                        </p>

                        <!-- ACTION BUTTONS -->
                        <div class="d-grid gap-3">

                            <form method="get" action="/update_email/{{ user_id }}">
                                <button class="btn btn-primary rounded-pill">
                                    Update Email
                                </button>
                            </form>

                            <form method="post" action="/delete_account/{{ user_id }}">
                                <button class="btn btn-danger rounded-pill">
                                    Delete Account
                                </button>
                            </form>

                            <form method="post" action="/logout">
                                <button class="btn btn-outline-secondary rounded-pill">
                                    Logout
                                </button>
                            </form>

                            <a href="{{ url_for('fetch_all') }}" class="btn btn-success rounded-pill">
                                View All Users
                            </a>

                            <!-- ✅ CREATE POST BUTTON -->
                            <a href="/create_post" class="btn btn-dark rounded-pill">
                                + Create Post
                            </a>

                        </div>

                    </div>
                </div>

            </div>
        </div>

        <!-- ✅ POSTS SECTION -->
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">

                <h4 class="text-center mb-4">All Posts</h4>

                {% for post in posts %}
                <div class="card mb-3 shadow-sm border-0 rounded-3">
                    <div class="card-body">
                        <p class="mb-2">{{ post.content }}</p>
                        <small class="text-muted">
                            User {{ post.user_id }} | {{ post.created_at }}
                        </small>
                    </div>
                </div>
                {% endfor %}

            </div>
        </div>

    </div>

</body>

</html>
